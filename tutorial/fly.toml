# Fly.io — TUTORIAL API (FastAPI). Deploy from ``tutorial/`` with:
#   fly deploy --remote-only
#
# GitHub Pages UI uses repo variable ``TUTORIAL_PAGES_API_URL`` pointing here
# (e.g. ``https://<app>.fly.dev/api/v1``).

app = "chessing234-anvil-tutorial"
primary_region = "iad"

[build]
  dockerfile = "docker/Dockerfile.api"

[env]
  TUTORIAL_DATABASE__URL = "sqlite:////app/data/tutorial.db"
  TUTORIAL_ORCHESTRATION__PERSISTENCE_DB_PATH = "/app/data/orchestration.db"
  TUTORIAL_ORCHESTRATION__DEFENSE_CHECKPOINT_DB = "/app/data/checkpoints_defense.sqlite"
  TUTORIAL_ORCHESTRATION__TEACHING_CHECKPOINT_DB = "/app/data/checkpoints_teaching.sqlite"
  TUTORIAL_STATE_MACHINE__CHECKPOINT_PATH = "/app/data/state_checkpoints.sqlite"
  TUTORIAL_MCP__REGISTRY_CACHE_PATH = "/app/data/mcp_registry.sqlite"
  TUTORIAL_API__EVIDENCE_UPLOAD_DIR = "/app/data/evidence_uploads"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
