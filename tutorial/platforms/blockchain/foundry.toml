[profile.default]
src = "contracts"
test = "test"
out = "out"
cache_path = "cache"
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200

# Mantle / Ethereum L2s: deploy with `forge create` after `source .env` (CHAIN_ID, RPC_URL, PRIVATE_KEY).
# Solidity tests: `cd platforms/blockchain && forge test`
