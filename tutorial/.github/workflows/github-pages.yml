# Standalone tutorial repo: deploy frontend/ to GitHub Pages.
# (Monorepo users: use ../.github/workflows/tutorial-github-pages.yml instead.)

name: GitHub Pages

on:
  push:
    branches: [main, master]
    paths:
      - "frontend/**"
      - ".github/workflows/github-pages.yml"
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Compute Vite base path for GitHub Pages
        id: pages_base
        shell: bash
        run: |
          repo="${GITHUB_REPOSITORY##*/}"
          if [[ "$repo" == *.github.io ]]; then
            echo "base=/" >> "$GITHUB_OUTPUT"
          else
            echo "base=/${repo}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Install and build
        working-directory: frontend
        env:
          VITE_BASE_PATH: ${{ steps.pages_base.outputs.base }}
          VITE_API_URL: ${{ vars.TUTORIAL_PAGES_API_URL }}
          VITE_API_KEY: ${{ secrets.TUTORIAL_PAGES_API_KEY }}
        run: |
          npm ci
          npm run build
          cp dist/index.html dist/404.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
