name: Publish containers

on:
  push:
    tags:
      - "v*"

env:
  REGISTRY: ghcr.io

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: tutorial-api
            file: docker/Dockerfile.api
          - name: tutorial-agent
            file: docker/Dockerfile.agent
          - name: tutorial-frontend
            file: docker/Dockerfile.frontend
    steps:
      - uses: actions/checkout@v4
      - id: lower
        run: echo "image_base=${REGISTRY}/$(echo ${{ github.repository }} | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.file }}
          push: true
          platforms: linux/amd64
          tags: |
            ${{ steps.lower.outputs.image_base }}/${{ matrix.name }}:${{ github.ref_name }}
            ${{ steps.lower.outputs.image_base }}/${{ matrix.name }}:latest
