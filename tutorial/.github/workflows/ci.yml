name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: >-
          ruff check tutorial/ api/ database/ orchestration/ config/ core/
          integrations/ agents/ knowledge/ platforms/ events/ shared/ scripts/
      - name: Mypy (tutorial package)
        run: mypy tutorial/
      - name: Pytest with coverage
        run: >-
          pytest tests/ -v --tb=short
          --cov=tutorial --cov=api --cov=database --cov=orchestration --cov=config
          --cov=core --cov=integrations --cov=agents --cov=knowledge --cov=platforms
          --cov=events --cov=shared --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: coverage.xml
          fail_ci_if_error: false

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  build-containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build
