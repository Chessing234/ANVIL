name: Tutorial CI

on:
  push:
    paths:
      - "tutorial/**"
      - ".github/workflows/tutorial-ci.yml"
      - "render.yaml"
  pull_request:
    paths:
      - "tutorial/**"
      - ".github/workflows/tutorial-ci.yml"
      - "render.yaml"
  workflow_dispatch:

concurrency:
  group: tutorial-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    working-directory: tutorial

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tutorial/pyproject.toml
      - name: Install Python dependencies
        run: pip install -e ".[dev]"
      - name: Ruff
        run: ruff check .
      - name: Mypy (tutorial package)
        run: mypy tutorial/
      - name: Pytest with coverage
        run: >-
          pytest tests/ -v --tb=short
          --cov=tutorial --cov=api --cov=database --cov=orchestration --cov=config
          --cov=core --cov=integrations --cov=agents --cov=knowledge --cov=platforms
          --cov=events --cov=shared --cov-report=xml
      - name: Upload coverage
        uses: codecov/codecov-action@v4
        continue-on-error: true
        with:
          files: tutorial/coverage.xml
          fail_ci_if_error: false

  build-frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tutorial/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: tutorial/frontend/package-lock.json
      - run: npm ci
      - run: npm run build

  build-containers:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Docker Compose build
        working-directory: tutorial
        env:
          DOCKER_BUILDKIT: "1"
        run: docker compose build --parallel
